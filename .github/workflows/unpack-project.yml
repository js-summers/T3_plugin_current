name: Unpack project bundle

on:
  push:
    paths:
      - project_bundle.tar.gz.b64
      - .github/workflows/unpack-project.yml

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode bundled project files
        run: |
          base64 -d project_bundle.tar.gz.b64 > project_bundle.tar.gz
          tar -xzf project_bundle.tar.gz
          rm project_bundle.tar.gz project_bundle.tar.gz.b64
      - name: Commit unpacked project files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md PROJECT_NOTES.md index.html app.js styles.css yassified-ui .github/workflows/unpack-project.yml
          git diff --cached --quiet || git commit -m "Unpack recombinant protein planner files"
          git push
